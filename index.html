<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabalega Secondary School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17281B;
    --ink2:#233B29;
    --ink3:#2E4E36;
    --paper:#EFEAD8;
    --paper2:#F8F5EA;
    --gold:#C9962C;
    --gold-dark:#A67623;
    --maroon:#7A1F2B;
    --text:#201C12;
    --text-soft:#5B5646;
    --line:#D8CFB0;
    --success:#3C6E47;
    --danger:#8C2A2A;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;color:var(--text);font-family:'Work Sans',sans-serif;font-size:14.5px;line-height:1.5;
    min-height:100vh;
    background-color:var(--paper);
    position:relative;
  }
  #bgLayer{
    position:fixed;inset:-5%;z-index:-1;
    background-image:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ7ysEkl3wWHojtCDtCD5CnLkqTDdJJvOv_-VtBJ3LwLK4NoUnhATM5mitF&s=10');
    background-size:cover;background-position:center center;background-repeat:no-repeat;
    opacity:0.9;
    animation:bgDrift 60s ease-in-out infinite alternate;
    will-change:transform;
  }
  @keyframes bgDrift{
    0%{transform:scale(1.04) translate(0,0);}
    50%{transform:scale(1.10) translate(-1.2%,-1%);}
    100%{transform:scale(1.05) translate(1%,0.8%);}
  }
  h1,h2,h3,.display{font-family:'Zilla Slab',serif;letter-spacing:.2px;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:14px;}
  a{color:inherit;}
  ::selection{background:var(--gold);color:var(--ink);}

  /* ---------- LOGIN (full-bleed, sits on top of the body background photo) ---------- */
  .login-wrap{min-height:100vh;width:100%;display:flex;align-items:stretch;justify-content:center;padding:0;
    background:linear-gradient(180deg, rgba(23,40,27,.30), rgba(23,40,27,.55));}
  .id-card{width:100%;max-width:none;min-height:100vh;background:transparent;border:none;border-radius:0;display:grid;grid-template-columns:1fr 1.15fr;overflow:hidden;box-shadow:none;}
  .id-left{background:linear-gradient(180deg, rgba(23,40,27,.45), rgba(23,40,27,.82));color:var(--paper2);padding:56px 48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;}
  .id-left::after{content:"";position:absolute;right:0;top:0;bottom:0;width:14px;background:repeating-linear-gradient(180deg,var(--gold) 0 8px, transparent 8px 16px);opacity:.55;}
  .crest{width:84px;height:84px;border-radius:50%;border:2.5px solid var(--gold);display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:22px;}
  .crest span{font-family:'Zilla Slab',serif;font-weight:700;font-size:22px;color:var(--gold);}
  .crest-ring{position:absolute;inset:-8px;border:1px dashed rgba(201,150,44,.45);border-radius:50%;}
  .eyebrow{text-transform:uppercase;letter-spacing:2.5px;font-size:11px;color:var(--gold);font-weight:600;margin-bottom:8px;}
  .id-left h1{font-size:34px;margin:0 0 10px;line-height:1.15;}
  .id-left p{color:#E7EBE4;font-size:14px;max-width:36ch;}
  .stamp{align-self:flex-start;border:1.5px solid var(--gold);color:var(--gold);padding:6px 12px;border-radius:3px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;transform:rotate(-4deg);font-weight:600;}
  .id-right{padding:56px 64px;display:flex;flex-direction:column;justify-content:center;background:rgba(248,245,234,.95);backdrop-filter:blur(6px);overflow-y:auto;max-height:100vh;}
  .role-tabs{display:flex;gap:6px;margin-bottom:22px;border-bottom:1px solid var(--line);}
  .role-tab{flex:1;text-align:center;padding:10px 4px;font-size:13px;font-weight:600;color:var(--text-soft);border-bottom:2.5px solid transparent;letter-spacing:.3px;}
  .role-tab.active{color:var(--ink);border-color:var(--gold);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:1px;color:var(--text-soft);margin-bottom:6px;font-weight:600;}
  .field select, .field input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--text);}
  .btn{border:none;border-radius:4px;padding:11px 18px;font-weight:600;font-size:13.5px;letter-spacing:.3px;display:inline-flex;align-items:center;gap:8px;justify-content:center;transition:transform .08s ease;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--ink);color:var(--paper2);}
  .btn-primary:hover{background:#0f1c12;}
  .btn-gold{background:var(--gold);color:var(--ink);}
  .btn-gold:hover{background:var(--gold-dark);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-sm{padding:7px 12px;font-size:12.5px;}
  .hint-box{margin-top:18px;background:#fff;border:1px dashed var(--line);border-radius:4px;padding:12px 14px;font-size:12px;color:var(--text-soft);}
  .hint-box b{color:var(--text);}
  @media(max-width:840px){
    .id-card{grid-template-columns:1fr;}
    .id-left{padding:36px 28px;}
    .id-right{padding:36px 28px;max-height:none;}
  }
  @media(max-width:480px){
    .id-left{padding:28px 20px;}
    .id-right{padding:28px 20px;}
    .id-left h1{font-size:26px;}
    .crest{width:64px;height:64px;}
    .crest span{font-size:17px;}
  }

  /* ---------- SHELL ---------- */
  .shell{display:flex;min-height:100vh;background:var(--paper);}
  .sidebar{width:242px;background:var(--ink);color:var(--paper2);flex-shrink:0;display:flex;flex-direction:column;padding:22px 0;}
  .side-brand{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
  .side-brand .mini-crest{width:34px;height:34px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Zilla Slab',serif;font-weight:700;color:var(--gold);font-size:13px;flex-shrink:0;}
  .side-brand div b{display:block;font-family:'Zilla Slab',serif;font-size:15px;}
  .side-brand div span{font-size:10.5px;color:#9fb0a3;letter-spacing:1px;text-transform:uppercase;}
  .nav-group{padding:0 12px;margin-bottom:6px;}
  .nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:#7f9284;padding:12px 10px 6px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:4px;font-size:13.5px;color:#D7DED9;cursor:pointer;margin-bottom:2px;font-weight:500;}
  .nav-item:hover{background:rgba(255,255,255,.06);}
  .nav-item.active{background:var(--gold);color:var(--ink);font-weight:600;}
  .nav-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.6;flex-shrink:0;}
  .side-foot{margin-top:auto;padding:16px 20px 0;border-top:1px solid rgba(255,255,255,.08);}
  .user-chip{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--ink3);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;font-family:'Zilla Slab',serif;flex-shrink:0;}
  .user-chip div span{display:block;}
  .user-chip .uname{font-size:13px;font-weight:600;}
  .user-chip .urole{font-size:10.5px;color:#9fb0a3;text-transform:uppercase;letter-spacing:.6px;}

  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .topbar{height:60px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:var(--paper2);position:relative;gap:12px;}
  .topbar h2{margin:0;font-size:19px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar .breadcrumb{font-size:11px;color:var(--text-soft);text-transform:uppercase;letter-spacing:1px;}
  .topbar-right{display:flex;align-items:center;gap:16px;flex-shrink:0;}
  .content{padding:28px;overflow-y:auto;}

  /* ---------- Hamburger / mobile sidebar ---------- */
  .hamburger-btn{display:none;background:transparent;border:1px solid var(--line);border-radius:4px;width:36px;height:36px;font-size:17px;align-items:center;justify-content:center;flex-shrink:0;color:var(--text);}
  .sidebar-close{display:none;}
  .sidebar-overlay{display:none;}
  .table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .table-scroll table{min-width:520px;}

  @media(max-width:900px){
    .shell{position:relative;}
    .hamburger-btn{display:flex;}
    .sidebar{
      position:fixed;top:0;left:0;bottom:0;z-index:120;
      transform:translateX(-100%);transition:transform .22s ease;
      width:80vw;max-width:280px;box-shadow:4px 0 24px rgba(0,0,0,.25);
    }
    .shell.sidebar-open .sidebar{transform:translateX(0);}
    .sidebar-close{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.25);color:#D7DED9;font-size:13px;margin-left:auto;cursor:pointer;flex-shrink:0;}
    .side-brand{position:relative;}
    .sidebar-overlay{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:110;
    }
    .shell.sidebar-open .sidebar-overlay{display:block;}
    .topbar{padding:0 16px;}
    .topbar-date{display:none;}
    .content{padding:16px;}
  }
  @media(max-width:520px){
    .topbar h2{font-size:16px;}
    .content{padding:12px;}
  }

  .bell-wrap{position:relative;}
  .bell-btn{position:relative;width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .bell-dot{position:absolute;top:-2px;right:-2px;background:var(--danger);color:#fff;font-size:9.5px;font-weight:700;border-radius:20px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
  .bell-panel{position:absolute;top:44px;right:0;width:340px;max-width:88vw;max-height:420px;overflow-y:auto;background:#fff;border:1px solid var(--line);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:50;}
  .bell-head{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .bell-item{padding:10px 14px;border-bottom:1px dotted var(--line);font-size:12.5px;}
  .bell-item:last-child{border-bottom:none;}
  .bell-item .bt{color:var(--text-soft);font-size:10.5px;margin-top:3px;}

  .grid{display:grid;gap:16px;}
  .g4{grid-template-columns:repeat(4,1fr);}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g2{grid-template-columns:repeat(2,1fr);}
  @media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:640px){.g4,.g3,.g2{grid-template-columns:1fr;}}

  .card{background:var(--paper2);border:1px solid var(--line);border-radius:6px;padding:18px 20px;}
  .stat-card{background:var(--paper2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:4px;padding:16px 18px;}
  .stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-soft);font-weight:600;margin-bottom:8px;}
  .stat-card .value{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:var(--ink);}
  .stat-card .sub{font-size:11.5px;color:var(--text-soft);margin-top:4px;}

  .panel-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .panel-title h3{margin:0;font-size:16.5px;}

  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--paper2);background:var(--ink2);padding:10px 12px;font-weight:600;}
  th:first-child{border-radius:4px 0 0 4px;} th:last-child{border-radius:0 4px 4px 0;}
  td{padding:10px 12px;border-bottom:1px dotted var(--line);font-size:13.5px;}
  tr:last-child td{border-bottom:none;}
  .tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;}
  .tag-open{background:#F3E3C2;color:#7A5A12;}
  .tag-progress{background:#DCE7E0;color:var(--success);}
  .tag-resolved{background:#DDEBDF;color:var(--success);}
  .tag-maroon{background:#F1DCDC;color:var(--maroon);}

  .badge-grade{font-family:'IBM Plex Mono',monospace;font-weight:600;padding:2px 8px;border-radius:3px;background:var(--ink);color:var(--gold);font-size:12px;}

  .form-row{display:grid;gap:12px;margin-bottom:12px;}
  .form-row.two{grid-template-columns:1fr 1fr;}
  .form-row.three{grid-template-columns:1fr 1fr 1fr;}
  @media(max-width:640px){
    .form-row.two,.form-row.three{grid-template-columns:1fr;}
  }
  label.f{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-soft);margin-bottom:5px;font-weight:600;}
  .f input,.f select,.f textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:4px;background:#fff;}
  .f textarea{min-height:70px;resize:vertical;}

  .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 200px);min-height:340px;border:1px solid var(--line);border-radius:6px;background:var(--paper2);}
  .chat-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .chat-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
  .msg{max-width:70%;padding:9px 13px;border-radius:8px;font-size:13.5px;word-break:break-word;}
  @media(max-width:640px){.msg{max-width:88%;}}
  .msg .who{font-size:10.5px;font-weight:700;letter-spacing:.4px;color:var(--gold-dark);margin-bottom:2px;text-transform:uppercase;}
  .msg.me{align-self:flex-end;background:var(--ink);color:var(--paper2);border-bottom-right-radius:2px;}
  .msg.me .who{color:var(--gold);}
  .msg.other{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:2px;}
  .msg .time{font-size:10px;opacity:.6;margin-top:3px;}
  .chat-input{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line);}
  .chat-input input{flex:1;padding:10px 13px;border:1px solid var(--line);border-radius:20px;}

  .empty{padding:40px 20px;text-align:center;color:var(--text-soft);}
  .empty .big{font-size:34px;margin-bottom:8px;}

  .pill-list{display:flex;flex-wrap:wrap;gap:6px;}
  .pill{background:var(--paper);border:1px solid var(--line);padding:4px 10px;border-radius:20px;font-size:11.5px;color:var(--text-soft);}

  .qcard{border:1px solid var(--line);border-radius:6px;padding:16px 18px;margin-bottom:12px;background:#fff;}
  .qopt{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);border-radius:4px;margin-bottom:7px;cursor:pointer;font-size:13.5px;}
  .qopt:hover{border-color:var(--gold);}
  .qopt.picked{border-color:var(--gold);background:#FBF3E1;}

  .progress-track{height:8px;border-radius:20px;background:var(--line);overflow:hidden;}
  .progress-fill{height:100%;background:var(--gold);}

  .vote-card{border:1px solid var(--line);border-radius:6px;padding:16px;background:#fff;}
  .cand-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px dotted var(--line);}
  .cand-row:last-child{border-bottom:none;}

  .book-card{border:1px solid var(--line);border-radius:6px;padding:14px 16px;background:#fff;display:flex;flex-direction:column;gap:8px;}
  .book-cover{height:90px;border-radius:4px;background:linear-gradient(135deg,var(--ink2),var(--ink));display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:26px;}

  .small-note{font-size:11.5px;color:var(--text-soft);}
</style>
</head>
<body>
    <h1 style="position:absolute;left:-9999px;">KABALEGA SECONDARY SCHOOL</h1>
<div id="bgLayer"></div>
<div id="app"></div>

<script>
/* ===================== DATA ===================== */
const SUBJECTS = ["English Language","Mathematics","Physics","Chemistry","Biology","Geography","History",
"Christian Religious Education (CRE)","Islamic Religious Education (IRE)","Kiswahili","Literature in English",
"Agriculture","Commerce","Computer Studies / ICT","Fine Art","Physical Education","Luganda",
"Entrepreneurship Education","Technology & Design","Music, Dance & Drama","Home Economics",
"Nutrition & Food Technology","French","General Paper","Economics","Technical Drawing"];

const GENERAL_SHELF = "General Knowledge";

const CLASSES = ["S1","S2","S3","S4","S5","S6"];

let uidc = 1000;
const uid = (p)=> p + "-" + (uidc++);

const STATE = {
  session: null, // {role,id}
  page: "dashboard",
  chatGroup: null,
  activeTest: null,
  students: [

  ],
  teachers: [
   ],
  admins: [ {id:"adm-1", name:"Albert", pass:"1123"} ],

  feesStructure: {S1:450000,S2:450000,S3:480000,S4:520000,S5:600000,S6:600000}, // per term UGX
  payments: [],

  results: [
    {id:uid("res"), studentId:"stu-4", subject:"Mathematics", term:"Term 2", score:78, type:"Exam"},
    {id:uid("res"), studentId:"stu-4", subject:"Physics", term:"Term 2", score:64, type:"Exam"},
    {id:uid("res"), studentId:"stu-4", subject:"History", term:"Term 2", score:71, type:"Exam"},
    {id:uid("res"), studentId:"stu-6", subject:"Biology", term:"Term 2", score:88, type:"Exam"},
    {id:uid("res"), studentId:"stu-6", subject:"Chemistry", term:"Term 2", score:59, type:"Exam"},
  ],

  tests: [],
  submissions: [],
  attempts: {}, // "testId|studentId" -> start timestamp (ms)
  latePermissions: {}, // "testId|studentId" -> true if teacher granted a late submission

  notes: [],

  issues: [],

  notifications: [], // {id, audience:{type,cls?,id?}, text, date, ts, readBy:[]}

  library: [], // {id, title, author, subject, cls, category:'academic'|'general', uploaderId, uploaderRole, fileData, fileName, date}

  voting: {
    positions: [],
    votes: {}, // "posId|candId" -> count
    ballots: {} // "studentId|posId" -> candId
  },

  groups: {
    everyone:{name:"Everyone · School Announcements", messages:[]},
    S1:{name:"S1 Class Chat", messages:[]},
    S2:{name:"S2 Class Chat", messages:[]},
    S3:{name:"S3 Class Chat", messages:[]},
    S4:{name:"S4 Class Chat", messages:[]},
    S5:{name:"S5 Class Chat", messages:[]},
    S6:{name:"S6 Class Chat", messages:[]},
    teachers:{name:"Teachers' Room", messages:[]},
  },
};


const DEFAULT_STATE = JSON.parse(JSON.stringify(STATE));

/* ===================== HELPERS ===================== */
const esc = (s)=> String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const ugx = (n)=> "UGX " + Number(n).toLocaleString();
const grade = (score)=> score>=80?"A":score>=70?"B":score>=60?"C":score>=50?"D":score>=40?"E":"F";
const initials = (name)=> name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
const today = ()=> new Date().toISOString().slice(0,10);
const nowTime = ()=> new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});

function findStudent(id){ return STATE.students.find(s=>s.id===id); }
function findTeacher(id){ return STATE.teachers.find(t=>t.id===id); }
function studentBalance(s){
  const total = STATE.feesStructure[s.cls] || 0;
  const paid = STATE.payments.filter(p=>p.studentId===s.id).reduce((a,b)=>a+b.amount,0);
  return {total, paid, balance: total-paid};
}
function currentUser(){
  if(!STATE.session) return null;
  const {role,id} = STATE.session;
  if(role==="student") return findStudent(id);
  if(role==="teacher") return findTeacher(id);
  if(role==="admin") return STATE.admins.find(a=>a.id===id);
}

function render(){
  const app = document.getElementById("app");
  app.innerHTML = STATE.session ? renderShell() : renderLogin();
}

// Point this at your deployed Cloudflare Worker (see cf-worker/ folder),
// e.g. "https://kabasco-portal-api.<your-subdomain>.workers.dev"
// The Worker reads/writes a Cloudflare D1 database named "kabasco_portal"
// (bound in wrangler.toml as `db`). Leave this blank ("") to fall back to
// the browser's built-in shared storage instead.
const API_BASE = "https://kabasco1.untamed0.workers.dev";

const STORAGE_KEY = "kabalega-portal-data";
let storageAvailable = true;

function snapshotForStorage(){
  // Only persist real school data — not per-tab UI state like current page or in-progress test.
  const {session, page, chatGroup, activeTest, ...persisted} = STATE;
  return persisted;
}

async function persist(){
  const snapshot = snapshotForStorage();
  if(API_BASE){
    try{
      await fetch(API_BASE + "/api/state", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(snapshot)
      });
    }catch(e){
      console.error("Could not save to your D1-backed API:", e);
    }
    return;
  }
  if(!storageAvailable) return;
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(snapshot), true);
  }catch(e){
    console.error("Could not save to shared portal storage:", e);
  }
}

async function loadFromStorage(){
  if(API_BASE){
    try{
      const res = await fetch(API_BASE + "/api/state");
      if(res.ok){
        const data = await res.json();
        if(data && Object.keys(data).length){ Object.assign(STATE, data); return; }
      }
      await persist(); // no row in D1 yet — seed it with the file's defaults
    }catch(e){
      console.error("Could not reach your D1-backed API, falling back to built-in storage:", e);
    }
    return;
  }
  try{
    if(!window.storage){ storageAvailable = false; return; }
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){
      const data = JSON.parse(res.value);
      Object.assign(STATE, data);
    } else {
      await persist(); // first run: seed shared storage with the starter dataset
    }
  }catch(e){
    try{ await persist(); }catch(e2){ storageAvailable = false; }
  }
}

  app.innerHTML = `<div class="login-wrap"><div class="small-note" style="font-size:14px;color:#fff;">Loading Kabalega portal…</div></div>`;

async function doRegisterStudent(){
  const name = document.getElementById("regName").value.trim();
  const cls = document.getElementById("regClass").value;
  const adm = document.getElementById("regAdm").value.trim();
  const pass = document.getElementById("regPass").value;
  const pass2 = document.getElementById("regPass2").value;
  if(!name || !adm){ alert("Enter your full name and admission number."); return; }
  if(pass.length<4){ alert("Choose a password with at least 4 characters."); return; }
  if(pass!==pass2){ alert("Passwords do not match."); return; }
  if(STATE.students.some(s=>s.adm.toLowerCase()===adm.toLowerCase())){ alert("That admission number is already registered. Please sign in instead, or contact the school office."); return; }
  const student = {id:uid("stu"), name, cls, adm, pass, status:"pending"};
  STATE.students.push(student);
  notify({type:"admin"}, `New student registration pending approval: ${name} (${cls})`);
  await persist();
  loginMode = "login";
  render();
  alert("Thanks! Your student account has been submitted and is awaiting administrator approval. You'll be able to sign in once it's approved.");
}

async function doRegisterTeacher(){
  const name = document.getElementById("regTName").value.trim();
  const subjSelect = document.getElementById("regTSubjects");
  const subjects = Array.from(subjSelect.selectedOptions).map(o=>o.value);
  const classes = document.getElementById("regTClasses").value.split(",").map(s=>s.trim()).filter(Boolean);
  const pass = document.getElementById("regTPass").value;
  const pass2 = document.getElementById("regTPass2").value;
  if(!name || subjects.length===0 || classes.length===0){ alert("Enter your name, at least one subject and one class."); return; }
  if(pass.length<4){ alert("Choose a password with at least 4 characters."); return; }
  if(pass!==pass2){ alert("Passwords do not match."); return; }
  if(STATE.teachers.some(t=>t.name.toLowerCase()===name.toLowerCase())){ alert("A teacher with that name is already registered. Please sign in instead, or contact the administrator."); return; }
  const teacher = {id:uid("tch"), name, subjects, classes, pass, status:"pending", paid:false};

}

/* ===================== NOTIFICATIONS ===================== */
function notify(audience, text){
  STATE.notifications = STATE.notifications || [];
  STATE.notifications.unshift({id:uid("ntf"), audience, text, date:today(), ts:Date.now(), readBy:[]});
  if(STATE.notifications.length>300) STATE.notifications.length = 300;
}
function notificationsForCurrentUser(){
  const sess = STATE.session;
  if(!sess) return [];
  const u = currentUser();
  const list = STATE.notifications || [];
  return list.filter(n=>{
    const a = n.audience || {};
    if(a.type==="all") return true;
    if(a.type==="admin") return sess.role==="admin";
    if(a.type==="class") return sess.role==="student" && u.cls===a.cls;
    if(a.type==="student") return sess.role==="student" && u.id===a.id;
    if(a.type==="teacher") return sess.role==="teacher" && u.id===a.id;
    if(a.type==="teachers") return sess.role==="teacher";
    return false;
  });
}
function renderBell(){
  const list = notificationsForCurrentUser();
  const u = currentUser();
  const unread = list.filter(n=>!(n.readBy||[]).includes(u.id));
  return `
  <div class="bell-wrap">
    <div class="bell-btn" onclick="toggleBell()">🔔${unread.length? `<span class="bell-dot">${unread.length>9?'9+':unread.length}</span>`:''}</div>
    ${window.__bellOpen? `
    <div class="bell-panel">
      <div class="bell-head"><b style="font-size:13px;">Notifications</b>${list.length? `<span class="small-note" style="cursor:pointer;text-decoration:underline;" onclick="markAllRead()">mark all read</span>`:''}</div>
      ${list.length===0? `<div class="empty" style="padding:24px 14px;"><div class="big">🔕</div>No notifications yet.</div>` :
      list.slice(0,40).map(n=>`<div class="bell-item" style="${(n.readBy||[]).includes(u.id)?'':'background:#FBF3E1;'}">${esc(n.text)}<div class="bt">${n.date}</div></div>`).join("")}
    </div>` : ""}
  </div>`;
}
function toggleBell(){
  window.__bellOpen = !window.__bellOpen;
  render();
}
async function markAllRead(){
  const u = currentUser();
  notificationsForCurrentUser().forEach(n=>{ n.readBy = n.readBy||[]; if(!n.readBy.includes(u.id)) n.readBy.push(u.id); });
  await persist();
  render();
}

function feesOverview(){
  const approvedStudents = STATE.students.filter(s=>s.status!=="pending");
  const expected = approvedStudents.reduce((a,s)=>a+(STATE.feesStructure[s.cls]||0),0);
  const collected = STATE.payments.reduce((a,b)=>a+b.amount,0);
  const remaining = Math.max(0, expected - collected);
  const collectedPct = expected? Math.round(collected/expected*100) : 0;
  const remainingPct = expected? Math.max(0,100-collectedPct) : 0;
  return {expected, collected, remaining, collectedPct, remainingPct};
}

function loadResultsRoster(){

async function saveResults(cls, subject, term){
  const roster = STATE.students.filter(s=>s.cls===cls && s.status!=="pending");
  let count = 0;
  roster.forEach(s=>{
    const el = document.getElementById("score-"+s.id);
    if(!el || el.value==="") return;
    const score = Math.max(0, Math.min(100, Number(el.value)));
    const existing = STATE.results.find(r=>r.studentId===s.id && r.subject===subject && r.term===term);
    if(existing){ existing.score = score; } else {
      STATE.results.push({id:uid("res"), studentId:s.id, subject, term, score, type:"Exam"});
    }
    count++;
  });
  await persist();
  alert("Saved results for "+count+" student(s).");
}

/* ===================== TESTS ===================== */
function studentTests(){
  const s = currentUser();
  const mySubs = STATE.submissions.filter(x=>x.studentId===s.id);
  const lp = STATE.latePermissions || {};
  const available = STATE.tests.filter(t=> t.cls===s.cls && (
    t.active || t.type==="paper" || mySubs.some(x=>x.testId===t.id) || lp[t.id+"|"+s.id]
  ));
  if(STATE.activeTest) return renderTakeTest(STATE.activeTest);
  return `
  <div class="card">
    <div class="panel-title"><h3>Available tests for ${s.cls}</h3></div>
    ${available.length===0? `<div class="empty"><div class="big">📝</div>No tests currently open for your class.</div>` :
    `<div class="table-scroll"><table><thead><tr><th>Title</th><th>Subject</th><th>Type</th><th>Duration</th><th>Status</th><th></th></tr></thead><tbody>
      ${available.map(t=>{
        const sub = mySubs.find(x=>x.testId===t.id);
        const lateOk = !!lp[t.id+"|"+s.id];
        let statusCell, actionCell;
        if(t.type==="paper"){
          statusCell = `<span class="tag tag-progress">Manually graded</span>`;
          actionCell = `<button class="btn btn-primary btn-sm" onclick="downloadTestPaper('${t.id}')">Download paper</button>`;
        } else if(sub){
          const pct = Math.round(sub.score/sub.total*100);
          statusCell = `<span class="tag tag-resolved">Completed · ${sub.score}/${sub.total} (${pct}% · ${grade(pct)})</span>`;
          actionCell = "";
        } else if(!t.active && !lateOk){
          statusCell = `<span class="tag tag-open">Closed</span>`;
          actionCell = `<span class="small-note">Ask your teacher if you need a late submission.</span>`;
        } else {
          statusCell = t.active? `<span class="tag tag-open">Open now</span>` : `<span class="tag tag-progress">Late submission allowed</span>`;
          actionCell = `<button class="btn btn-primary btn-sm" onclick="startTest('${t.id}')">Start test</button>`;
        }
        return `<tr><td>${esc(t.title)}</td><td>${esc(t.subject)}</td><td>${t.type==='paper'?'Paper':'Objective'}</td><td>${t.duration} min</td>
        <td>${statusCell}</td><td>${actionCell}</td></tr>`;
      }).join("")}
    </tbody></table></div>`}
  </div>`;
}
function downloadTestPaper(id){
  const t = STATE.tests.find(x=>x.id===id);
  if(!t || !t.fileData) return;
  const a = document.createElement("a");
  a.href = t.fileData;
  a.download = t.fileName || (t.title.replace(/[^a-z0-9]+/gi,"_"));
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
async function startTest(id){
  const s = currentUser();
  STATE.attempts = STATE.attempts || {};
  const key = id+"|"+s.id;
  if(!STATE.attempts[key]) STATE.attempts[key] = Date.now();
  await persist();
  STATE.activeTest = id;
  render();
}
function renderTakeTest(testId){
  const t = STATE.tests.find(x=>x.id===testId);
  if(!t) return "<div class='empty'>Test not found.</div>";
  const s = currentUser();
  window.__answers = window.__answers || {};
  const key = testId+"|"+s.id;
  STATE.attempts = STATE.attempts || {};
  const startedAt = STATE.attempts[key] || Date.now();
  const deadline = startedAt + t.duration*60000;
  const lateAllowed = !!((STATE.latePermissions||{})[key]);
  const expired = Date.now() > deadline;
  const blocked = expired && !lateAllowed;

  if(window.__testTimer){ clearInterval(window.__testTimer); window.__testTimer=null; }
  if(!blocked){
    window.__testTimer = setInterval(()=>{
      const el = document.getElementById("testTimer");
      if(!el || STATE.activeTest!==testId){ clearInterval(window.__testTimer); window.__testTimer=null; return; }
      const remain = deadline - Date.now();
      if(remain<=0){
        el.textContent = "Time's up!";
        el.style.color = "var(--danger)";
        if(!lateAllowed){
          clearInterval(window.__testTimer); window.__testTimer=null;
          autoSubmitOnExpiry(testId);
        }
      } else {
        const mm = Math.floor(remain/60000);
        const ss = Math.floor((remain%60000)/1000);
        el.textContent = mm+":"+String(ss).padStart(2,"0")+" remaining";
        el.style.color = remain<60000 ? "var(--danger)" : "var(--ink)";
      }
    }, 1000);
  }

  return `
  <div class="card" style="margin-bottom:14px;">
    <div class="panel-title"><h3>${esc(t.title)}</h3><span class="small-note mono" id="testTimer" style="font-weight:700;"></span></div>
    <div class="small-note">${esc(t.subject)} · ${t.duration} min${lateAllowed?` · <span style="color:var(--success);font-weight:600;">Late submission approved by your teacher</span>`:''}</div>
  </div>
  ${blocked ? `
  <div class="empty"><div class="big">⏰</div>Time is up for this test — you can no longer submit answers.
    <div class="small-note" style="margin-top:6px;">If you have a genuine reason for submitting late, ask your teacher to grant you a late submission.</div>
    <div style="margin-top:14px;"><button class="btn btn-ghost" onclick="if(window.__testTimer)clearInterval(window.__testTimer);STATE.activeTest=null;window.__answers={};render()">Back to tests</button></div>
  </div>` : `
  ${t.questions.map((q,qi)=>`
    <div class="qcard">
      <div style="font-weight:600;margin-bottom:10px;">${qi+1}. ${esc(q.q)}</div>
      ${q.opts.map((o,oi)=>`<div class="qopt ${window.__answers[qi]===oi?'picked':''}" onclick="pickAnswer(${qi},${oi})">
        <span class="mono" style="width:18px;">${String.fromCharCode(65+oi)}</span> ${esc(o)}
      </div>`).join("")}
    </div>`).join("")}
  <button class="btn btn-gold" onclick="submitTest('${t.id}')">Submit test</button>
  <button class="btn btn-ghost" style="margin-left:8px;" onclick="if(window.__testTimer)clearInterval(window.__testTimer);STATE.activeTest=null;window.__answers={};render()">Cancel</button>
  `}`;
}
function pickAnswer(qi,oi){ window.__answers=window.__answers||{}; window.__answers[qi]=oi; render(); }
async function autoSubmitOnExpiry(testId){
  if(STATE.activeTest !== testId) return;
  alert("Time is up! Submitting your answers automatically.");
  await submitTest(testId);
}
async function submitTest(testId){
  const t = STATE.tests.find(x=>x.id===testId);
  const s = currentUser();
  const answers = window.__answers || {};
  let score = 0;
  t.questions.forEach((q,qi)=>{ if(answers[qi]===q.ans) score++; });
  const total = t.questions.length;
  const pct = total? Math.round(score/total*100) : 0;
  STATE.submissions.push({id:uid("sub"), testId, studentId:s.id, score, total, date:today()});
  STATE.results.push({id:uid("res"), studentId:s.id, subject:t.subject, term:"Term 2", score:pct, type:"Online Test"});
  if(window.__testTimer){ clearInterval(window.__testTimer); window.__testTimer=null; }
  window.__answers = {};
  STATE.activeTest = null;
  await persist();
  render();
  alert("Test submitted! You scored "+score+" / "+total+" ("+pct+"%) — Grade "+grade(pct)+".");
}

async function toggleActiveTest(id){
  const x = STATE.tests.find(t=>t.id===id);
  if(!x) return;
  x.active = !x.active;
  if(x.active){
    notify({type:"class", cls:x.cls}, `New test "${x.title}" (${x.subject}) is now open for ${x.cls}. Duration: ${x.duration} min.`);

  } else {
    notify({type:"class", cls:x.cls}, `The test "${x.title}" (${x.subject}) has been closed.`);
  }
  await persist();
  render();
}
async function toggleLate(testId, studentId){

  if(STATE.latePermissions[k]) delete STATE.latePermissions[k]; else STATE.latePermissions[k] = true;

  render();
}

/* ===================== VOTING ===================== */
function voteKey(pos,cand){ return pos+"|"+cand; }
function ballotKey(stu,pos){ return stu+"|"+pos; }
function votingStatus(pos){
  const now = Date.now();
  if(pos.startAt && now < pos.startAt) return "upcoming";
  if(pos.endAt && now > pos.endAt) return "closed";
  return "open";
}
function fmtDT(ms){ return ms ? new Date(ms).toLocaleString(undefined,{dateStyle:"medium", timeStyle:"short"}) : ""; }
function getWinners(pos){
  const v = STATE.voting;
  const totalVotes = pos.candidates.reduce((a,c)=>a+(v.votes[voteKey(pos.id,c.id)]||0),0);
  if(totalVotes===0) return {winners:[], max:0, totalVotes};
  let max = 0;
  pos.candidates.forEach(c=>{ const ct=v.votes[voteKey(pos.id,c.id)]||0; if(ct>max) max=ct; });
  const winners = pos.candidates.filter(c=>(v.votes[voteKey(pos.id,c.id)]||0)===max);
  return {winners, max, totalVotes};
}
function checkVotingAnnouncements(){
  let changed = false;
  (STATE.voting.positions||[]).forEach(pos=>{
    if(pos.announced) return;
    if(votingStatus(pos)!=="closed") return;
    const {winners, totalVotes} = getWinners(pos);
    let text;
    if(totalVotes===0){ text = `Voting for "${pos.title}" has closed with no votes cast.`; }
    else if(winners.length===1){ text = `🏆 ${winners[0].name} has won the "${pos.title}" position!`; }
    else { text = `Voting for "${pos.title}" ended in a tie between ${winners.map(w=>w.name).join(", ")}.`; }
    notify({type:"all"}, text);
    pos.announced = true;
    changed = true;
  });
  if(changed) persist();
}
function votingPage(){
  const role = STATE.session.role;
  const u = currentUser();
  const v = STATE.voting;
  checkVotingAnnouncements();
  return `
  ${role==="admin"? `<div class="card" style="margin-bottom:18px;"><div class="panel-title"><h3>Add new position</h3></div>
    <div class="form-row two">
      <div class="f"><label>Position title</label><input id="posTitle" placeholder="e.g. Sports Captain"></div>
      <div class="f"><label>Candidates (comma-separated names)</label><input id="posCands" placeholder="e.g. Ayebale ken, KAtusime Gorret"></div>
    </div>
    <div class="form-row two">
      <div class="f"><label>Voting opens</label><input id="posStart" type="datetime-local"></div>
      <div class="f"><label>Voting closes</label><input id="posEnd" type="datetime-local"></div>
    </div>
    <div class="small-note" style="margin-bottom:10px;">Leave either field blank to leave that side open-ended.</div>
    <button class="btn btn-gold btn-sm" onclick="addPosition()">Create position</button>
  </div>` : ""}
  <div class="grid g2">
  ${v.positions.length===0? `<div class="empty" style="grid-column:1/-1;"><div class="big">🗳️</div>No voting positions have been created yet.</div>` :
  v.positions.map(pos=>{
    const totalVotes = pos.candidates.reduce((a,c)=>a+(v.votes[voteKey(pos.id,c.id)]||0),0);
    const already = role==="student" ? v.ballots[ballotKey(u.id,pos.id)] : null;
    const status = votingStatus(pos);
    const statusTag = status==="open"? `<span class="tag tag-resolved">Open now</span>` : status==="upcoming"? `<span class="tag tag-open">Opens ${fmtDT(pos.startAt)}</span>` : `<span class="tag tag-maroon">Closed</span>`;
    const {winners, totalVotes:tv2} = status==="closed" ? getWinners(pos) : {winners:[], totalVotes:0};
    const winnerIds = winners.map(w=>w.id);
    let winnerBanner = "";
    if(status==="closed"){
      if(tv2===0){ winnerBanner = `<div class="hint-box" style="margin:0 0 12px;">No votes were cast for this position.</div>`; }
      else if(winners.length===1){ winnerBanner = `<div class="hint-box" style="margin:0 0 12px;border-color:var(--gold);"><b>🏆 Winner: ${esc(winners[0].name)}</b> — announced after voting closed.</div>`; }
      else { winnerBanner = `<div class="hint-box" style="margin:0 0 12px;">🤝 It's a tie between ${winners.map(w=>esc(w.name)).join(", ")}.</div>`; }
    }
    return `<div class="vote-card">
      <div class="panel-title"><h3>${esc(pos.title)}</h3><span class="small-note">${totalVotes} vote${totalVotes!==1?'s':''}</span></div>
      <div style="margin-bottom:10px;">${statusTag} ${pos.endAt && status==="open"? `<span class="small-note">· closes ${fmtDT(pos.endAt)}</span>`:''}</div>
      ${winnerBanner}
      ${pos.candidates.map(c=>{
        const count = v.votes[voteKey(pos.id,c.id)]||0;
        const pct = totalVotes? Math.round(count/totalVotes*100) : 0;
        const isMine = already===c.id;
        const isWinner = status==="closed" && tv2>0 && winnerIds.includes(c.id);
        return `<div class="cand-row">
          <div style="flex:1;">
            <div style="font-weight:600;">${esc(c.name)} <span class="small-note">${c.cls}</span> ${isWinner? `<span class="tag tag-resolved">🏆 Winner</span>`:''}</div>
            <div class="progress-track" style="margin-top:6px;"><div class="progress-fill" style="width:${pct}%;${isWinner?'background:var(--gold-dark);':''}"></div></div>
          </div>
          <div style="text-align:right;min-width:110px;">
            <div class="mono" style="font-size:12.5px;">${count} (${pct}%)</div>
            ${role==="student" ? (already? (isMine? `<span class="tag tag-resolved">Your vote</span>` : "") : (status==="open"? `<button class="btn btn-primary btn-sm" style="margin-top:4px;" onclick="castVote('${pos.id}','${c.id}')">Vote</button>` : `<span class="small-note">Voting ${status==='upcoming'?'not open':'closed'}</span>`)) : ""}
          </div>
        </div>`;
      }).join("")}
      ${role==="student" && already ? `<div class="small-note" style="margin-top:8px;">You've already voted for this position.</div>` : ""}
    </div>`;
  }).join("")}
  </div>`;
}
async function castVote(posId, candId){
  const u = currentUser();
  const pos = STATE.voting.positions.find(p=>p.id===posId);
  if(pos && votingStatus(pos)!=="open"){ alert("Voting for this position is not currently open."); return; }
  const bk = ballotKey(u.id,posId);
  if(STATE.voting.ballots[bk]){ alert("You already voted for this position."); return; }
  STATE.voting.ballots[bk] = candId;
  const vk = voteKey(posId,candId);
  STATE.voting.votes[vk] = (STATE.voting.votes[vk]||0)+1;
  await persist();
  render();
}
async function addPosition(){
  const title = document.getElementById("posTitle").value.trim();
  const names = document.getElementById("posCands").value.split(",").map(s=>s.trim()).filter(Boolean);
  const startVal = document.getElementById("posStart").value;
  const endVal = document.getElementById("posEnd").value;
  if(!title || names.length<2){ alert("Enter a title and at least two candidates."); return; }
  const posId = uid("pos");
  const startAt = startVal ? new Date(startVal).getTime() : null;
  const endAt = endVal ? new Date(endVal).getTime() : null;
  if(startAt && endAt && endAt<=startAt){ alert("Closing time must be after opening time."); return; }
  STATE.voting.positions.push({id:posId, title, candidates:names.map((n,i)=>({id:"c"+posId+i, name:n, cls:"—"})), startAt, endAt});
  notify({type:"all"}, `Voting for "${title}" is now scheduled${startAt?` from ${fmtDT(startAt)}`:''}${endAt?` until ${fmtDT(endAt)}`:''}.`);
  await persist();
  render();
}

    <div class="panel-title"><h3>My reports</h3></div>
    ${mine.length===0? `<div class="empty"><div class="big">🗒️</div>You haven't reported anything yet.</div>` :
    `<div class="table-scroll"><table><thead><tr><th>Title</th><th>Category</th><th>Date</th><th>Status</th></tr></thead><tbody>
      ${mine.map(i=>`<tr><td>${esc(i.title)}</td><td>${esc(i.category)}</td><td>${i.date}</td><td><span class="tag ${i.status==='Resolved'?'tag-resolved':i.status==='In Progress'?'tag-progress':'tag-open'}">${i.status}</span></td></tr>`).join("")}
    </tbody></table></div>`}
  </div>`;
}
function nameOf(id){ return (findStudent(id)||findTeacher(id)||{name:"Unknown"}).name; }
async function submitIssue(){
  const u = currentUser();
  const category = document.getElementById("issCat").value;
  const title = document.getElementById("issTitle").value.trim();
  const desc = document.getElementById("issDesc").value.trim();
  if(!title || !desc){ alert("Add a title and description."); return; }
  STATE.issues.push({id:uid("iss"), by:u.id, role:STATE.session.role, category, title, desc, status:"Open", date:today()});
  notify({type:"admin"}, `New ${category} issue reported: "${title}"`);
  await persist();
  render();
  alert("Issue submitted to the administration.");
}
async function advanceIssue(id){
  const i = STATE.issues.find(x=>x.id===id);
  i.status = i.status==="Open" ? "In Progress" : "Resolved";
  await persist();
  render();
}

/* ===================== ADMIN: STUDENTS / TEACHERS ===================== */

    <div class="table-scroll"><table><thead><tr><th>Name</th><th>Class</th><th>Adm No.</th><th></th></tr></thead><tbody>
      ${pending.map(s=>`<tr><td>${esc(s.name)}</td><td>${s.cls}</td><td class="mono">${esc(s.adm)}</td>
      <td style="display:flex;gap:6px;"><button class="btn btn-primary btn-sm" onclick="approveStudent('${s.id}')">Approve</button>
      <button class="btn btn-ghost btn-sm" style="border-color:var(--danger);color:var(--danger);" onclick="rejectStudent('${s.id}')">Reject</button></td></tr>`).join("")}
    </tbody></table></div>
  </div>` : ""}
  <div class="card" style="margin-bottom:20px;">
    <div class="panel-title"><h3>Admit a new student</h3></div>
    <div class="form-row three">
      <div class="f"><label>Full name</label><input id="newStuName" placeholder="e.g. Asumpta"></div>
      <div class="f"><label>Class</label><select id="newStuClass">${CLASSES.map(c=>`<option>${c}</option>`).join("")}</select></div>
      <div class="f"><label>Admission No.</label><input id="newStuAdm" placeholder="e.g A001"></div>
    </div>
    <div class="form-row two">
      <div class="f"><label>Set password</label>
        <div style="display:flex;gap:6px;">
          <input id="newStuPass" type="text" placeholder="At least 4 characters" style="flex:1;">
          <button class="btn btn-ghost btn-sm" type="button" onclick="genStuPass()">Generate</button>
        </div>
      </div>
      <div class="f"><label>&nbsp;</label><div class="small-note">The student will use this password to sign in — share it with them securely. They can change it later in Settings.</div></div>
    </div>
    <button class="btn btn-gold btn-sm" onclick="addStudent()">Admit student</button>
  </div>
  <div class="card">
    <div class="panel-title"><h3>All students (${approved.length})</h3></div>
    <div class="table-scroll"><table><thead><tr><th>Name</th><th>Class</th><th>Adm No.</th><th>Balance</th><th></th></tr></thead><tbody>
      ${approved.map(s=>{const {balance}=studentBalance(s); return `<tr><td>${esc(s.name)}</td><td>${s.cls}</td><td class="mono">${esc(s.adm)}</td><td class="mono" style="color:${balance>0?'var(--danger)':'var(--success)'};">${ugx(balance)}</td><td><button class="btn btn-ghost btn-sm" style="border-color:var(--danger);color:var(--danger);" onclick="deleteStudent('${s.id}')">Delete</button></td></tr>`;}).join("")}
    </tbody></table></div>
  </div>`;
}
async function approveStudent(id){
  const s = findStudent(id);
  if(!s) return;
  s.status = "approved";
  notify({type:"student", id}, `Welcome! Your student account has been approved. You can now sign in.`);
  await persist();
  render(); STATE.page="students"; render();
}
async function rejectStudent(id){
  if(!confirm("Reject and remove this registration?")) return;
  STATE.students = STATE.students.filter(s=>s.id!==id);
  await persist();
  render(); STATE.page="students"; render();
}
function genStuPass(){
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";
  let p = "";
  for(let i=0;i<8;i++) p += chars[Math.floor(Math.random()*chars.length)];
  document.getElementById("newStuPass").value = p;
}
async function deleteStudent(id){
  const s = findStudent(id);
  if(!s) return;
  if(!confirm(`Remove ${s.name} (${s.cls}) from the system? This deletes their account, results, payments, test submissions and votes. This cannot be undone.`)) return;
  STATE.students = STATE.students.filter(x=>x.id!==id);
  STATE.results = STATE.results.filter(r=>r.studentId!==id);
  STATE.payments = STATE.payments.filter(p=>p.studentId!==id);
  STATE.submissions = STATE.submissions.filter(x=>x.studentId!==id);
  STATE.issues = STATE.issues.filter(i=>i.by!==id);
  Object.keys(STATE.voting.ballots).forEach(k=>{ if(k.startsWith(id+"|")) delete STATE.voting.ballots[k]; });
  STATE.attempts = STATE.attempts || {};
  STATE.latePermissions = STATE.latePermissions || {};
  Object.keys(STATE.attempts).forEach(k=>{ if(k.endsWith("|"+id)) delete STATE.attempts[k]; });
  Object.keys(STATE.latePermissions).forEach(k=>{ if(k.endsWith("|"+id)) delete STATE.latePermissions[k]; });
  await persist();
  render(); STATE.page="students"; render();
}
async function addStudent(){
  const name = document.getElementById("newStuName").value.trim();
  const cls = document.getElementById("newStuClass").value;
  const adm = document.getElementById("newStuAdm").value.trim() || ("BFSS-"+cls+"-"+Math.floor(Math.random()*900+100));
  const pass = document.getElementById("newStuPass").value.trim();
  if(!name){ alert("Enter the student's full name."); return; }
  if(pass.length<4){ alert("Set a password with at least 4 characters (use Generate for a random one)."); return; }
  STATE.students.push({id:uid("stu"), name, cls, adm, pass, status:"approved"});
  await persist();
  render(); STATE.page="students"; render();
  alert("Student admitted. Password: "+pass+" — please share this with the student securely.");
}
function adminTeachers(){
  const pending = STATE.teachers.filter(t=>t.status==="pending");
  const approved = STATE.teachers.filter(t=>t.status!=="pending");
  return `
  ${pending.length>0? `

        <div style="display:flex;gap:6px;">
          <input id="newTchPass" type="text" placeholder="At least 4 characters" style="flex:1;">
          <button class="btn btn-ghost btn-sm" type="button" onclick="genTchPass()">Generate</button>
        </div>
      </div>
      <div class="f"><label>&nbsp;</label><div class="small-note">Share this password with the teacher — they can change it any time from Settings.</div></div>
    </div>
    <button class="btn btn-gold btn-sm" onclick="addTeacher()">Add teacher</button>
  </div>
  <div class="card">
    <div class="panel-title"><h3>All teachers (${approved.length})</h3></div>
    <div class="table-scroll"><table><thead><tr><th>Name</th><th>Subjects</th><th>Classes</th></tr></thead><tbody>
      ${approved.map(t=>`<tr><td>${esc(t.name)}</td><td>${esc(t.subjects.join(", "))}</td><td>${esc(t.classes.join(", "))}</td></tr>`).join("")}

  const chars = "ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";

  for(let i=0;i<8;i++) p += chars[Math.floor(Math.random()*chars.length)];

  const t = findTeacher(id);
  if(!t) return;
  t.status = "approved";
  notify({type:"teacher", id}, `Welcome! Your teacher account has been approved. You can now sign in.`);
  await persist();
  render(); STATE.page="teachers"; render();

async function rejectTeacher(id){
  if(!confirm("Reject and remove this registration?")) return;
  STATE.teachers = STATE.teachers.filter(t=>t.id!==id);
  await persist();
  render(); STATE.page="teachers"; render();
}
async function addTeacher(){
  const name = document.getElementById("newTchName").value.trim();
  const classes = document.getElementById("newTchClasses").value.split(",").map(s=>s.trim()).filter(Boolean);
  const subjSelect = document.getElementById("newTchSubjects");
  const subjects = Array.from(subjSelect.selectedOptions).map(o=>o.value);
  const pass = document.getElementById("newTchPass").value.trim();
  if(!name || classes.length===0 || subjects.length===0){ alert("Fill in name, at least one class and one subject."); return; }
  if(pass.length<4){ alert("Set a password with at least 4 characters (use Generate for a random one)."); return; }
  STATE.teachers.push({id:uid("tch"), name, subjects, classes, pass, status:"approved", paid:false});
  await persist();
  render(); STATE.page="teachers"; render();
  alert("Teacher added. Password: "+pass+" — please share this with the teacher securely. They can change it any time from Settings.");
}

/* ===================== SETTINGS ===================== */

  const role = STATE.session.role;
  return `
  <div class="grid g2">
    <div class="card">
      <div class="panel-title"><h3>Account details</h3></div>
      <table><tbody>
        <tr><td style="font-weight:600;width:160px;">Name</td><td>${esc(u.name)}</td></tr>

    <div class="card">
      <div class="panel-title"><h3>Change password</h3></div>
      <div class="f"><label>Current password</label><input id="curPass" type="password"></div>
      <div class="f"><label>New password</label><input id="newPass" type="password" placeholder="At least 4 characters"></div>
      <div class="f" style="margin-bottom:14px;"><label>Confirm new password</label><input id="newPass2" type="password"></div>
      <button class="btn btn-gold" onclick="changePassword()">Update password</button>
    </div>
  </div>
  ${role==="admin"? `
  <div class="card" style="margin-top:16px;">
    <div class="panel-title"><h3>Administrator accounts</h3></div>
    <div class="table-scroll"><table><thead><tr><th>Name</th></tr></thead><tbody>
      ${STATE.admins.map(a=>`<tr><td>${esc(a.name)}</td></tr>`).join("")}
    </tbody></table></div>
    <div class="form-row two" style="margin-top:14px;">
      <div class="f"><label>New administrator name</label><input id="newAdmName" placeholder="e.g. Mr. Albert"></div>
      <div class="f"><label>Temporary password</label><input id="newAdmPass" type="password" placeholder="At least 4 characters"></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="addAdmin()">Add administrator</button>
    <div class="small-note" style="margin-top:8px;">New administrators should sign in and set their own password here right away. It can take a moment to sync — wait for the confirmation alert before signing out.</div>
  </div>
  <div class="card" style="margin-top:16px;border-color:var(--danger);">
    <div class="panel-title"><h3 style="color:var(--danger);">Danger zone</h3></div>
    <div class="small-note" style="margin-bottom:10px;">If accounts or data here don't match what's in the portal's source file (for example after you hand-edit the seed data), shared storage may be holding an older copy. This wipes ALL saved data for every user and restores the defaults built into this file.</div>
    <button class="btn btn-ghost btn-sm" style="border-color:var(--danger);color:var(--danger);" onclick="resetPortalData()">Reset all portal data to file defaults</button>
  </div>` : ""}
  `;
}
async function changePassword(){
  const u = currentUser();
  const cur = document.getElementById("curPass").value;
  const np = document.getElementById("newPass").value;
  const np2 = document.getElementById("newPass2").value;
  if(u.pass !== cur){ alert("Your current password is incorrect."); return; }
  if(np.length<4){ alert("Choose a new password with at least 4 characters."); return; }
  if(np !== np2){ alert("New passwords do not match."); return; }
  u.pass = np;
  await persist();
  document.getElementById("curPass").value = "";
  document.getElementById("newPass").value = "";
  document.getElementById("newPass2").value = "";
  alert("Your password has been updated.");
}
async function addAdmin(){
  const name = document.getElementById("newAdmName").value.trim();
  const pass = document.getElementById("newAdmPass").value;
  if(!name || pass.length<4){ alert("Enter a name and a password with at least 4 characters."); return; }
  STATE.admins.push({id:uid("adm"), name, pass});
  await persist();
  render(); STATE.page="settings"; render();
  alert("New administrator account created and saved. They can now sign in from the Admin tab.");
}
async function resetPortalData(){
  if(!confirm("This will erase ALL saved portal data (students, teachers, results, fees, tests, notes, library, votes, messages) for everyone and restore the defaults built into this file. This cannot be undone. Continue?")) return;
  const fresh = JSON.parse(JSON.stringify(DEFAULT_STATE));
  Object.assign(STATE, fresh);
  STATE.session = null;
  await persist();
  loginMode = "login";
  render();
  alert("Portal data has been reset to the defaults in this file. Please sign in again.");
}

boot();
